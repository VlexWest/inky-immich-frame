# Copy to config.yaml and fill in. config.yaml is gitignored.
immich_url: "http://your-immich-host:2283"
api_key: "REPLACE_WITH_SCOPED_READONLY_KEY"
refresh_times: ["07:30", "12:30"]
cache_dir: "cache"
state_file: "state/state.json"
width: 800
height: 480
saturation: 0.5

# What fills the space around a photo that does not fit the panel exactly.
# "white" = a mat, like a real picture frame. "blur" = a blurred copy of the
# photo behind it. Nothing is cropped either way.
background: "white"
